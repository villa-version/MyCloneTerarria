name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.get_version.outputs.tag_name }}

    steps:
    - name: Checkout code
      if: github.event_name == 'workflow_dispatch'
      uses: actions/checkout@v4

    - name: Create and push tag
      if: github.event_name == 'workflow_dispatch'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
        git push origin "v${{ inputs.version }}"

    - name: Get version
      id: get_version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "tag_name=v${{ inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "tag_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.tag_name }}
        name: MyCloneTerraria ${{ steps.get_version.outputs.tag_name }}
        body: |
          ## MyCloneTerraria ${{ steps.get_version.outputs.tag_name }}

          ### Downloads
          - **Linux**: `MyCloneTerraria-linux-x64.tar.gz`
          - **macOS**: `MyCloneTerraria-macos.tar.gz`
          - **Windows**: `MyCloneTerraria-windows-x64.zip`

          ### Installation

          **Linux / macOS:**
          ```bash
          tar -xzf MyCloneTerraria-*.tar.gz
          cd MyCloneTerraria
          ./MyCloneTerraria
          ```

          **Windows:**
          1. Extract `MyCloneTerraria-windows-x64.zip`
          2. Run `MyCloneTerraria.exe`

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake \
          libx11-dev libxrandr-dev libxcursor-dev libxi-dev \
          libudev-dev libgl-dev \
          libfreetype-dev \
          libopenal-dev libflac-dev libvorbis-dev

    - name: Cache SFML
      uses: actions/cache@v4
      id: cache-sfml
      with:
        path: .deps/sfml-install
        key: sfml-3.0.2-${{ runner.os }}-static-v1

    - name: Build SFML
      if: steps.cache-sfml.outputs.cache-hit != 'true'
      run: bash scripts/build-deps.sh

    - name: Build
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --parallel

    - name: Package
      run: |
        mkdir -p package/MyCloneTerraria
        cp build/MyCloneTerraria package/MyCloneTerraria/
        cp -r assets package/MyCloneTerraria/
        cd package && tar -czf MyCloneTerraria-linux-x64.tar.gz MyCloneTerraria/

    - name: Upload asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.create-release.outputs.tag_name }}
        files: ./package/MyCloneTerraria-linux-x64.tar.gz

  build-macos:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Cache SFML
      uses: actions/cache@v4
      id: cache-sfml
      with:
        path: .deps/sfml-install
        key: sfml-3.0.2-${{ runner.os }}-static-v1

    - name: Build SFML
      if: steps.cache-sfml.outputs.cache-hit != 'true'
      run: bash scripts/build-deps.sh

    - name: Build
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --parallel

    - name: Package
      run: |
        mkdir -p package/MyCloneTerraria
        cp build/MyCloneTerraria package/MyCloneTerraria/
        cp -r assets package/MyCloneTerraria/
        cd package && tar -czf MyCloneTerraria-macos.tar.gz MyCloneTerraria/

    - name: Upload asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.create-release.outputs.tag_name }}
        files: ./package/MyCloneTerraria-macos.tar.gz

  build-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Cache SFML
      uses: actions/cache@v4
      id: cache-sfml
      with:
        path: .deps/sfml-install
        key: sfml-3.0.2-${{ runner.os }}-static-v1

    - name: Build SFML
      if: steps.cache-sfml.outputs.cache-hit != 'true'
      run: pwsh scripts/build-deps.ps1

    - name: Build
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release --parallel

    - name: Package
      run: |
        New-Item -ItemType Directory -Path package\MyCloneTerraria
        Copy-Item build\Release\MyCloneTerraria.exe package\MyCloneTerraria\
        Copy-Item -Recurse assets package\MyCloneTerraria\assets
        Compress-Archive -Path package\MyCloneTerraria -DestinationPath package\MyCloneTerraria-windows-x64.zip

    - name: Upload asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.create-release.outputs.tag_name }}
        files: ./package/MyCloneTerraria-windows-x64.zip
