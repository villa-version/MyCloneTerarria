name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake \
          libx11-dev libxrandr-dev libxcursor-dev libxi-dev \
          libudev-dev libgl-dev \
          libfreetype-dev \
          libopenal-dev libflac-dev libvorbis-dev

    - name: Cache SFML
      uses: actions/cache@v4
      id: cache-sfml
      with:
        path: .deps/sfml-install
        key: sfml-3.0.2-${{ runner.os }}-static-v1

    - name: Build SFML
      if: steps.cache-sfml.outputs.cache-hit != 'true'
      run: bash scripts/build-deps.sh

    - name: Configure
      run: cmake -B build

    - name: Build
      run: cmake --build build --parallel

    - name: Verify
      run: file build/MyCloneTerraria

  build-macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache SFML
      uses: actions/cache@v4
      id: cache-sfml
      with:
        path: .deps/sfml-install
        key: sfml-3.0.2-${{ runner.os }}-static-v1

    - name: Build SFML
      if: steps.cache-sfml.outputs.cache-hit != 'true'
      run: bash scripts/build-deps.sh

    - name: Configure
      run: cmake -B build

    - name: Build
      run: cmake --build build --parallel

    - name: Verify
      run: file build/MyCloneTerraria

  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache SFML
      uses: actions/cache@v4
      id: cache-sfml
      with:
        path: .deps/sfml-install
        key: sfml-3.0.2-${{ runner.os }}-static-v1

    - name: Build SFML
      if: steps.cache-sfml.outputs.cache-hit != 'true'
      run: pwsh scripts/build-deps.ps1

    - name: Configure
      run: cmake -B build

    - name: Build
      run: cmake --build build --config Release

    - name: Verify
      run: Test-Path build\Release\MyCloneTerraria.exe
